<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完全解析ソルバー搭載 反転パズル</title>
    <style>
        @keyframes blink {
            0% { opacity: 1; background-color: #ffeb3b; }
            50% { opacity: 0.3; background-color: white; }
            100% { opacity: 1; background-color: #ffeb3b; }
        }
        .hint-flash {
            animation: blink 1s infinite;
            box-shadow: inset 0 0 10px #ffcc00;
        }

        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f8f9fa; margin: 0; padding: 20px; box-sizing: border-box; }
        * { box-sizing: inherit; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; color: #333; }
        #status-label { font-size: 16px; margin-bottom: 5px; font-weight: bold; }
        #moves-label { font-size: 20px; font-weight: bold; color: blue; margin-bottom: 5px; }
        .solver-badge { font-size: 12px; color: white; background-color: #ff6b6b; padding: 3px 8px; border-radius: 12px; display: inline-block; margin-bottom: 15px; display: none; }
        .section-box { border: 1px solid #ccc; border-radius: 5px; padding: 10px; margin-bottom: 15px; position: relative; }
        .section-title { font-size: 14px; font-weight: bold; margin-top: -20px; background: white; display: inline-block; padding: 0 5px; color: #555; }
        .radio-group { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-group { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; }
        button { cursor: pointer; border: 1px solid #aaa; border-radius: 5px; padding: 8px 10px; font-size: 14px; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #btn-easy { background-color: #ccffcc; } #btn-normal { background-color: #ffffcc; }
        #btn-hard { background-color: #ffcccc; } #btn-super { background-color: #ff99cc; }
        #btn-god { background-color: #cc99ff; }
        #btn-reset { background-color: #ffddaa; width: 100%; padding: 10px; margin-bottom: 15px; }
        #btn-replay { background-color: #87ceeb; width: 100%; padding: 10px; margin-bottom: 15px; display: none; }
        
        #grid-container { 
            display: grid; 
            gap: 2px; 
            margin: 15px auto; 
            background-color: #333; 
            padding: 2px; 
            border: 2px solid #333; 
            width: 100%; 
            max-width: 400px; 
            touch-action: none; 
        }
        .cell { 
            background-color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            color: blue; 
            aspect-ratio: 1 / 1; 
            transition: background-color 0.1s; 
            user-select: none; 
        }
        .cell.active { background-color: #ff9999; }
        
        #seed-area { background-color: #fff3e0; }
        .seed-input-group { display: flex; gap: 5px; margin-top: 5px; }
        #seed-input { flex: 1; padding: 5px; font-family: monospace; }
        .answer-btn { width: 100%; padding: 10px; margin-bottom: 5px; font-size: 14px; background-color: #e6e6fa; }
        .controls { display: grid; grid-template-columns: 50px 50px 50px; gap: 5px; justify-content: center; margin-top: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>反転パズル (完全解析ソルバー搭載)</h1>
    
    <div class="section-box" id="seed-area">
        <div class="section-title">パズルを共有する</div>
        <div class="seed-input-group">
            <input type="text" id="seed-input" placeholder="シード値">
            <button onclick="playFromSeedInput()">読込</button>
            <button onclick="copyShareURL()">URLコピー</button>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">新規ゲーム作成</div>
        <div class="radio-group" id="size-selectors"></div>
        <div class="btn-group" style="margin-top:10px;">
            <button id="btn-easy" onclick="startGameByDifficulty(8)">初級</button>
            <button id="btn-normal" onclick="startGameByDifficulty(15)">中級</button>
            <button id="btn-hard" onclick="startGameByDifficulty(22)">上級</button>
            <button id="btn-super" onclick="startGameByDifficulty(27)">超級</button>
            <button id="btn-god" onclick="startGameByDifficulty(30)">神級</button>
        </div>
    </div>

    <div id="status-label" style="margin-top: 20px;">サイズと難易度を選んでください</div>
    <div id="moves-label">残り手数: -</div>
    <div id="solver-badge" class="solver-badge">✨ AI最短手数解析済</div>

    <div id="grid-container"></div>

    <div class="controls">
        <div style="grid-column: 2;"><button onclick="attemptMove('Up')">▲</button></div>
        <div style="grid-column: 1; grid-row: 2;"><button onclick="attemptMove('Left')">◀</button></div>
        <div style="grid-column: 2; grid-row: 2;"><button onclick="attemptMove('Down')">▼</button></div>
        <div style="grid-column: 3; grid-row: 2;"><button onclick="attemptMove('Right')">▶</button></div>
    </div>

    <button id="btn-reset" onclick="resetGame()">🔄 同じ問題をやり直す</button>
    <button id="btn-replay" onclick="replayUserPath()">⏪ 自分のクリア手順をリプレイ</button>

    <div class="section-box" style="background-color: #f0f8ff;">
        <div class="section-title" style="background-color: #f0f8ff;">ヒント・解答機能</div>
        <button class="answer-btn" onclick="showHint()">💡 ヒント（正解ルートまで戻って次を表示）</button>
        <button class="answer-btn" id="btn-autoplay" onclick="autoPlayAnswer()" style="background-color: #d8bfd8;">▶ 最短ルートで自動実演</button>
        <div id="answer-display" style="display: none; margin-top: 10px; font-weight: bold; word-break: break-all; line-height: 1.5;"></div>
    </div>
</div>

<script>
    function mulberry32(a) {
        return function() {
          var t = a += 0x6D2B79F5;
          t = Math.imul(t ^ t >>> 15, t | 1);
          t ^= t + Math.imul(t ^ t >>> 7, t | 61);
          return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    let gridSize = 5;
    let gridData = [];
    let playerPos = [0, 0];
    let movesLeft = 0;
    let isPlaying = false;
    let lastMove = null;
    let currentSeedString = "";

    let initialGridData, initialPlayerPos, initialMoves, solutionMoves;
    let isAutoPlaying = false;
    let autoPlayInterval = null;
    
    // スワイプ・ヒント・リプレイ用の変数群
    let isDragging = false;
    let dragPath = [];
    let moveHistory = [];
    let activeHint = null;
    let isRewinding = false;
    let userWinningPath = [];

    const opposites = {'Up': 'Down', 'Down': 'Up', 'Left': 'Right', 'Right': 'Left'};
    const moveMap = {'Up': [-1, 0], 'Down': [1, 0], 'Left': [0, -1], 'Right': [0, 1]};
    const arrowMap = {'Up': '▲', 'Down': '▼', 'Left': '◀', 'Right': '▶'};

    window.onload = () => {
        setupSizeSelectors();
        updateDifficultyButtons();
        setupSwipeControls();
        
        const urlParams = new URLSearchParams(window.location.search);
        const seedParam = urlParams.get('seed');
        if (seedParam) playFromSeed(seedParam);

        document.addEventListener('keydown', (e) => {
            if (!isPlaying || isAutoPlaying || isRewinding) return;
            if (e.key === 'ArrowUp') attemptMove('Up');
            if (e.key === 'ArrowDown') attemptMove('Down');
            if (e.key === 'ArrowLeft') attemptMove('Left');
            if (e.key === 'ArrowRight') attemptMove('Right');
        });
    };

    function setupSizeSelectors() {
        const container = document.getElementById('size-selectors');
        for (let i = 5; i <= 9; i++) {
            const label = document.createElement('label');
            label.innerHTML = `<input type="radio" name="gridSize" value="${i}" ${i==5?'checked':''}> ${i}x${i}`;
            label.querySelector('input').addEventListener('change', (e) => {
                gridSize = parseInt(e.target.value);
                updateDifficultyButtons();
            });
            container.appendChild(label);
        }
    }

    function getActualSteps(baseSteps) {
        const ratio = (gridSize * gridSize) / 25.0;
        return Math.round(baseSteps * ratio);
    }

    function updateDifficultyButtons() {
        document.getElementById('btn-easy').innerText = `初級 (${getActualSteps(8)}手目安)`;
        document.getElementById('btn-normal').innerText = `中級 (${getActualSteps(15)}手目安)`;
        document.getElementById('btn-hard').innerText = `上級 (${getActualSteps(22)}手目安)`;
        document.getElementById('btn-super').innerText = `超級 (${getActualSteps(27)}手目安)`;
        document.getElementById('btn-god').innerText = `神級 (${getActualSteps(30)}手目安)`;
    }

    function startGameByDifficulty(baseSteps) {
        const randomID = Math.floor(Math.random() * 999999);
        const newSeed = `${gridSize}-${baseSteps}-${randomID}`;
        playFromSeed(newSeed);
    }

    function playFromSeedInput() {
        const val = document.getElementById('seed-input').value;
        if (val) playFromSeed(val);
    }

    function playFromSeed(seedString) {
        stopAutoPlay();
        const parts = seedString.split('-');
        if (parts.length !== 3) return;

        currentSeedString = seedString;
        document.getElementById('seed-input').value = seedString;
        
        gridSize = parseInt(parts[0]);
        const baseSteps = parseInt(parts[1]);
        const seedVal = parseInt(parts[2]);
        
        const radios = document.getElementsByName('gridSize');
        radios.forEach(r => r.checked = (parseInt(r.value) === gridSize));
        updateDifficultyButtons();

        const actualSteps = getActualSteps(baseSteps);
        const rng = mulberry32(seedVal);
        buildGridUI();
        
        const generated = generateOptimalBoard(actualSteps, rng, gridSize);
        let optimizedPath = solvePuzzleBFS(generated.grid, generated.pos[0], generated.pos[1]);
        
        if (optimizedPath) {
            solutionMoves = optimizedPath;
            movesLeft = optimizedPath.length;
            document.getElementById('solver-badge').style.display = 'inline-block';
        } else {
            solutionMoves = generated.moves.reverse().map(m => opposites[m]);
            movesLeft = solutionMoves.length;
            document.getElementById('solver-badge').style.display = 'none';
        }

        gridData = generated.grid;
        playerPos = generated.pos;
        initialGridData = gridData.map(row => [...row]);
        initialPlayerPos = [...playerPos];
        initialMoves = movesLeft;
        lastMove = null;
        
        // 状態リセット
        isPlaying = true;
        isDragging = false;
        isRewinding = false;
        moveHistory = [];
        activeHint = null;
        document.getElementById('btn-replay').style.display = 'none';
        document.getElementById('answer-display').style.display = 'none';
        
        document.getElementById('status-label').innerText = `パズル開始: ${gridSize}x${gridSize}`;
        updateGridUI();
    }

    function generateBoardSeeded(steps, rng) {
        let grid = Array.from({length: gridSize}, () => Array(gridSize).fill(0));
        let r = Math.floor(rng() * gridSize);
        let c = Math.floor(rng() * gridSize);
        
        let currentMask = 0n;
        let visitedStates = new Set();
        visitedStates.add((currentMask << 7n) | BigInt(r * gridSize + c));

        let lastGenMove = null;
        let genMoves = [];
        const directions = [
            {dr: -1, dc: 0, name: 'Up'}, {dr: 1, dc: 0, name: 'Down'},
            {dr: 0, dc: -1, name: 'Left'}, {dr: 0, dc: 1, name: 'Right'}
        ];

        for (let i = 0; i < steps; i++) {
            currentMask ^= (1n << BigInt(r * gridSize + c));
            grid[r][c] = 1 - grid[r][c];

            let validMoves = directions.filter(d => {
                if (lastGenMove && d.name === opposites[lastGenMove]) return false;
                let nr = r + d.dr, nc = c + d.dc;
                if(nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                    let stateKey = (currentMask << 7n) | BigInt(nr * gridSize + nc);
                    if (visitedStates.has(stateKey)) return false; 
                    return true;
                }
                return false;
            });

            if (validMoves.length === 0) {
                validMoves = directions.filter(d => {
                    if (lastGenMove && d.name === opposites[lastGenMove]) return false;
                    let nr = r + d.dr, nc = c + d.dc;
                    return (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize);
                });
                if (validMoves.length === 0) break;
            }

            let move = validMoves[Math.floor(rng() * validMoves.length)];
            r += move.dr; c += move.dc;
            lastGenMove = move.name;
            genMoves.push(move.name);

            visitedStates.add((currentMask << 7n) | BigInt(r * gridSize + c));
        }
        return {grid, pos: [r, c], moves: genMoves};
    }
    
    function generateOptimalBoard(steps, rng, size) {
        let bestBoard = null;
        let maxArea = 0;

        for (let i = 0; i < 100; i++) {
            let candidate = generateBoardSeeded(steps, rng);
            let minR = size, maxR = -1, minC = size, maxC = -1;
            
            minR = Math.min(minR, candidate.pos[0]);
            maxR = Math.max(maxR, candidate.pos[0]);
            minC = Math.min(minC, candidate.pos[1]);
            maxC = Math.max(maxC, candidate.pos[1]);

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (candidate.grid[r][c] === 1) {
                        minR = Math.min(minR, r);
                        maxR = Math.max(maxR, r);
                        minC = Math.min(minC, c);
                        maxC = Math.max(maxC, c);
                    }
                }
            }

            let area = (maxR - minR + 1) * (maxC - minC + 1);

            if (area > maxArea) {
                maxArea = area;
                bestBoard = candidate;
                if (area === size * size) break;
            }
        }
        return bestBoard;
    }

    function solvePuzzleBFS(grid, startR, startC) {
        let startMask = 0n;
        for(let r=0; r<gridSize; r++){
            for(let c=0; c<gridSize; c++){
                if(grid[r][c] === 1) startMask |= (1n << BigInt(r * gridSize + c));
            }
        }

        const targetMask1 = 0n;
        let targetMask2 = 0n;
        for(let i=0; i<gridSize*gridSize; i++) targetMask2 |= (1n << BigInt(i));

        if(startMask === targetMask1 || startMask === targetMask2) return [];

        let queue = [ { mask: startMask, r: startR, c: startC, path: [], lastMove: null } ];
        let qIdx = 0;
        let visited = new Set();
        visited.add((startMask << 7n) | BigInt(startR * gridSize + startC));

        const dirs = [
            { dr: -1, dc: 0, name: 'Up', opp: 'Down' },
            { dr: 1, dc: 0, name: 'Down', opp: 'Up' },
            { dr: 0, dc: -1, name: 'Left', opp: 'Right' },
            { dr: 0, dc: 1, name: 'Right', opp: 'Left' }
        ];

        let maxNodes = 100000; 

        while(qIdx < queue.length) {
            let curr = queue[qIdx++];
            if(qIdx > maxNodes) return null;

            for(let d of dirs) {
                if(curr.lastMove === d.opp) continue;
                let nr = curr.r + d.dr;
                let nc = curr.c + d.dc;
                if(nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                    let nPos = nr * gridSize + nc;
                    let nMask = curr.mask ^ (1n << BigInt(nPos));

                    if(nMask === targetMask1 || nMask === targetMask2) {
                        return [...curr.path, d.name];
                    }

                    let stateKey = (nMask << 7n) | BigInt(nPos);
                    if(!visited.has(stateKey)) {
                        visited.add(stateKey);
                        queue.push({ mask: nMask, r: nr, c: nc, path: [...curr.path, d.name], lastMove: d.name });
                    }
                }
            }
        }
        return null;
    }

    function buildGridUI() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        container.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
        
        let fontSize = gridSize <= 6 ? '24px' : (gridSize <= 7 ? '20px' : '16px');

        for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${r}-${c}`;
                cell.style.fontSize = fontSize; 
                container.appendChild(cell);
            }
        }
    }

    function updateGridUI() {
        document.getElementById('moves-label').innerText = `残り手数: ${movesLeft}`;
        for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
                const cell = document.getElementById(`cell-${r}-${c}`);
                if (!cell) continue;
                cell.classList.toggle('active', gridData[r][c] === 1);
                
                if (r === playerPos[0] && c === playerPos[1]) {
                    cell.innerText = "★";
                    cell.classList.remove('hint-flash');
                } else if (activeHint && r === activeHint.r && c === activeHint.c) {
                    cell.innerHTML = `<span style="color:red; font-size:1.2em;">${activeHint.arrow}</span>`;
                    cell.classList.add('hint-flash');
                } else {
                    cell.innerText = "";
                    cell.classList.remove('hint-flash');
                }
            }
        }
    }

    function attemptMove(moveName, isAuto = false) {
        if (!isPlaying || (isAutoPlaying && !isAuto) || isDragging || isRewinding) return;
        if (lastMove && moveName === opposites[lastMove]) return;

        let dr = moveMap[moveName][0], dc = moveMap[moveName][1];
        let nr = playerPos[0] + dr, nc = playerPos[1] + dc;

        if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
            activeHint = null; 
            playerPos = [nr, nc];
            gridData[nr][nc] = 1 - gridData[nr][nc];
            lastMove = moveName;
            movesLeft--;
            moveHistory.push(moveName); 
            updateGridUI();
            checkGameEnd();
        }
    }

    function checkGameEnd() {
        let flat = gridData.flat();
        if (flat.every(c => c === 0) || flat.every(c => c === 1)) {
            isPlaying = false;
            document.getElementById('status-label').innerText = "🎉 完璧なクリアです！";
            
            // ★追加: クリア時に履歴を保存してリプレイボタンを表示
            userWinningPath = [...moveHistory];
            document.getElementById('btn-replay').style.display = 'block';
            return;
        }
        if (movesLeft <= 0) {
            isPlaying = false;
            document.getElementById('status-label').innerText = "GAME OVER (手数が尽きました)";
        }
    }

    function undoLastMove() {
        if (moveHistory.length === 0) return;
        let lastM = moveHistory.pop();
        
        gridData[playerPos[0]][playerPos[1]] = 1 - gridData[playerPos[0]][playerPos[1]];
        
        let opp = opposites[lastM];
        let dr = moveMap[opp][0], dc = moveMap[opp][1];
        playerPos = [playerPos[0] + dr, playerPos[1] + dc];
        
        movesLeft++;
        lastMove = moveHistory.length > 0 ? moveHistory[moveHistory.length - 1] : null;
    }

    function showHint() {
        if (!isPlaying || isAutoPlaying || isRewinding) return;
        
        let matchIndex = 0;
        while(matchIndex < moveHistory.length && matchIndex < solutionMoves.length && moveHistory[matchIndex] === solutionMoves[matchIndex]) {
            matchIndex++;
        }
        
        if (moveHistory.length > matchIndex) {
            isRewinding = true; // 操作をロック
            activeHint = null;
            
            // 250ミリ秒ごとに1手ずつ巻き戻すアニメーション
            let rewindInterval = setInterval(() => {
                if (moveHistory.length > matchIndex) {
                    undoLastMove();
                    updateGridUI();
                } else {
                    clearInterval(rewindInterval);
                    isRewinding = false; // 操作ロック解除
                    setHintMarker(matchIndex);
                }
            }, 250);
        } else {
            setHintMarker(matchIndex);
        }
    }

    function setHintMarker(matchIndex) {
        if (matchIndex < solutionMoves.length) {
            let nextM = solutionMoves[matchIndex];
            activeHint = {
                r: playerPos[0] + moveMap[nextM][0],
                c: playerPos[1] + moveMap[nextM][1],
                arrow: arrowMap[nextM]
            };
        }
        updateGridUI(); 
    }

    function setupSwipeControls() {
        const container = document.getElementById('grid-container');

        container.addEventListener('pointerdown', (e) => {
            if (!isPlaying || isAutoPlaying || isRewinding) return;
            let cell = e.target.closest('.cell');
            if (!cell) return;
            
            let [_, r, c] = cell.id.split('-');
            r = parseInt(r); c = parseInt(c);
            
            if (r === playerPos[0] && c === playerPos[1]) {
                isDragging = true;
                dragPath = [`${r},${c}`];
            }
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            
            let elem = document.elementFromPoint(e.clientX, e.clientY);
            if (!elem) return;
            
            let cell = elem.closest('.cell');
            if (!cell) return;
            
            let [_, r, c] = cell.id.split('-');
            r = parseInt(r); c = parseInt(c);
            let currentRC = `${r},${c}`;
            let lastPosStr = dragPath[dragPath.length - 1];

            if (currentRC !== lastPosStr) {
                if (dragPath.length > 1 && currentRC === dragPath[dragPath.length - 2]) {
                    let popped = dragPath.pop();
                    let [lr, lc] = popped.split(',').map(Number);
                    gridData[lr][lc] = 1 - gridData[lr][lc]; 
                    playerPos = [r, c];
                    movesLeft++;
                    moveHistory.pop(); 
                    lastMove = moveHistory.length > 0 ? moveHistory[moveHistory.length - 1] : null; 
                    updateGridUI();
                } else {
                    let pr = playerPos[0], pc = playerPos[1];
                    if (Math.abs(r - pr) + Math.abs(c - pc) === 1) { 
                        
                        let moveDir = '';
                        if (r < pr) moveDir = 'Up';
                        else if (r > pr) moveDir = 'Down';
                        else if (c < pc) moveDir = 'Left';
                        else if (c > pc) moveDir = 'Right';

                        if (dragPath.length === 1 && lastMove && moveDir === opposites[lastMove]) {
                            return; 
                        }

                        if (movesLeft > 0) { 
                            activeHint = null; 
                            playerPos = [r, c];
                            gridData[r][c] = 1 - gridData[r][c];
                            movesLeft--;
                            dragPath.push(currentRC);
                            moveHistory.push(moveDir); 
                            updateGridUI();
                        }
                    }
                }
            }
        });

        const handleDragEnd = (e) => {
            if (!isDragging) return;
            isDragging = false;
            
            if (dragPath.length > 1) {
                let [lr, lc] = dragPath[dragPath.length - 1].split(',').map(Number);
                let [pr, pc] = dragPath[dragPath.length - 2].split(',').map(Number);
                if (lr < pr) lastMove = 'Up';
                else if (lr > pr) lastMove = 'Down';
                else if (lc < pc) lastMove = 'Left';
                else if (lc > pc) lastMove = 'Right';
            }
            
            checkGameEnd();
        };

        document.addEventListener('pointerup', handleDragEnd);
        document.addEventListener('pointercancel', handleDragEnd);
    }

    function resetGame() {
        if (currentSeedString) playFromSeed(currentSeedString);
    }

    function copyShareURL() {
        if (!currentSeedString) return;
        const url = window.location.origin + window.location.pathname + "?seed=" + currentSeedString;
        navigator.clipboard.writeText(url).then(() => alert("URLをコピーしました！友達に挑戦させましょう。"));
    }

    function autoPlayAnswer() {
        if (!isPlaying || isAutoPlaying || isRewinding) return;
        resetGame();
        isAutoPlaying = true;
        let step = 0;
        const ansDiv = document.getElementById('answer-display');
        ansDiv.style.display = 'block';

        autoPlayInterval = setInterval(() => {
            if (step < solutionMoves.length) {
                let pathHtml = solutionMoves.map((m, idx) => {
                    return idx === step ? `<span style="color:red; font-size:1.3em;">${arrowMap[m]}</span>` : arrowMap[m];
                }).join('➔');
                ansDiv.innerHTML = `<span style="font-size:14px; color:#555;">【AI最短ルート実演中...】</span><br>${pathHtml}`;
                
                attemptMove(solutionMoves[step], true);
                step++;
            } else {
                stopAutoPlay();
                ansDiv.innerHTML += `<br><span style="color:red; font-size:18px;">✨ 実演完了！ ✨</span>`;
            }
        }, 400);
    }

    // ★追加: 自分のクリア手順をリプレイする関数
    function replayUserPath() {
        if (isAutoPlaying || isRewinding || userWinningPath.length === 0) return;
        resetGame(); 
        isAutoPlaying = true;
        let step = 0;
        const ansDiv = document.getElementById('answer-display');
        ansDiv.style.display = 'block';

        autoPlayInterval = setInterval(() => {
            if (step < userWinningPath.length) {
                let currentM = userWinningPath[step];
                ansDiv.innerHTML = `<span style="font-size:14px; color:#555;">【あなたのクリア手順をリプレイ中...】</span><br><span style="font-weight:bold; font-size:18px; color:blue;">手数: ${step + 1} / ${userWinningPath.length}</span><br>方向: <span style="font-size:1.5em; color:red;">${arrowMap[currentM]}</span>`;
                
                attemptMove(currentM, true);
                step++;
            } else {
                stopAutoPlay();
                ansDiv.innerHTML += `<br><span style="color:red; font-size:18px;">✨ リプレイ完了！ ✨</span>`;
            }
        }, 400);
    }

    function stopAutoPlay() {
        clearInterval(autoPlayInterval);
        isAutoPlaying = false;
    }
</script>
</body>
</html>
